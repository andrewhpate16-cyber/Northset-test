<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Northset | Your Austin Marketing Partner</title>
  <meta name="description" content="Your Austin marketing partner. Strategy, websites, and digital growth." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://googleapis.com" />
  <link rel="preconnect" href="https://gstatic.com" crossorigin />
  <link href="https://googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* Reset & Base Styles */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: "DM Sans", sans-serif; 
      background: #FFFFFF; 
      color: #1a1a1a;
      line-height: 1.6;
    }

    /* Simple Layout */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      padding: 80px 20px;
      background: #f9f9f9;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .hero-subtitle {
      font-size: 1.2rem;
      color: #666;
      max-width: 600px;
      margin: 0 auto 30px;
    }

    .cta-button {
      display: inline-block;
      background: #d4870e;
      color: white;
      padding: 15px 30px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .meet-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
      margin-top: 60px;
    }

    .andrew-photo {
      width: 100%;
      max-width: 380px;
      border-radius: 16px;
      background: #eee; /* Placeholder until image loads */
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .meet-grid { grid-template-columns: 1fr; text-align: center; }
      h1 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <h1>Northset</h1>
      <p class="hero-subtitle">Your Austin marketing partner. Strategy, websites, and digital growth — handled personally for your business.</p>
      <a href="mailto:your-email@example.com" class="cta-button">Work With Me</a>
    </div>
  </header>

  <main class="container">
    <div class="meet-grid">
      <div class="photo-column">
        <!-- Replace the src with your actual image URL later -->
        <div class="andrew-photo" style="height: 450px; display: flex; align-items: center; justify-content: center; color: #999;">
          [Photo Placeholder]
        </div>
      </div>
      <div class="text-column">
        <h2 style="font-family: 'Playfair Display'; margin-bottom: 20px;">Meet Andrew</h2>
        <p>I help Austin-based businesses grow their digital presence through tailored marketing strategies and high-performing websites.</p>
      </div>
    </div>
  </main>

</body>
</html>
